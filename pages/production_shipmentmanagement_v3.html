  --green:#2F9E44;--red:#C92A2A;
  --in-bg:#F0F7FF;--out-bg:#FFFDF0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}
.nav{background:#1A1D23;color:#fff;display:flex;align-items:center;padding:0 24px;height:48px;gap:4px;flex-shrink:0}
.nav-brand{font-weight:700;font-size:15px;margin-right:20px}
.nav-item{padding:0 14px;height:48px;display:flex;align-items:center;font-size:13px;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent}
.nav-item:hover{color:#fff}
.nav-item.on{color:#fff;border-bottom-color:var(--primary)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sb-hd h2{font-size:14px;font-weight:700;margin-bottom:8px}
.sb-search{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;outline:none}
.sb-search:focus{border-color:var(--primary)}
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{padding:9px 16px;cursor:pointer;border-left:3px solid transparent}
.sb-item:hover{background:#F8F9FA}
.sb-item.active{background:#EEF2FF;border-left-color:var(--primary)}
.sb-name{font-size:13px;font-weight:600;margin-bottom:2px}
.sb-meta{font-size:11px;color:var(--text2)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.no-proj{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px}
.proj-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.proj-name{font-size:17px;font-weight:700;margin-bottom:4px}
.proj-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.proj-meta strong{color:var(--text);font-weight:600}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;flex-shrink:0}
.tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2)}
.tab:hover{color:var(--text)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.panel{flex:1;overflow-y:auto;padding:18px 20px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.sec-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-title{font-size:14px;font-weight:700;flex:1}
.rec-wrap{overflow-x:auto}
.rec{width:100%;border-collapse:collapse;font-size:12px}
.rec th{background:#F3F5F8;padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
.rec td{padding:7px 10px;border-bottom:1px solid #F0F2F5;vertical-align:middle}
.rec tr:last-child td{border-bottom:none}
.in-row td{background:var(--in-bg)}
.out-row td{background:var(--out-bg)}
.out-row td:first-child{padding-left:22px;position:relative}
.out-row td:first-child::before{content:"└ ";color:#bbb}
.rec tr.in-row:hover td{background:#E8F2FF}
.rec tr.out-row:hover td{background:#FFFAE0}
.type-in{display:inline-block;padding:1px 7px;background:#DBEAFE;color:#1D4ED8;border-radius:4px;font-size:10px;font-weight:700}
.type-out{display:inline-block;padding:1px 7px;background:#FEF3C7;color:#92400E;border-radius:4px;font-size:10px;font-weight:700}
.rec-mono{font-family:monospace}
.empty-row{padding:24px;text-align:center;color:var(--text2)}
.st-pill{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.st-진행중{background:#EEF2FF;color:#3B5BDB}
.st-완료{background:#EBFBEE;color:#2F9E44}
.st-scrap{background:#FFE3E3;color:#C92A2A}
.dir-pill{padding:1px 7px;border-radius:10px;font-size:11px;background:#F3F5F8;color:#333}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-mpw{background:var(--mpw-bg);color:var(--mpw)}

.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 7px;font-size:11px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:#f0f0f0}
.btn-danger{background:#fff;border:1px solid #fcc;color:var(--red)}

.btn-out{background:#fff;border:1px solid #FDE68A;color:#92400E}

.actions{display:flex;gap:4px}

/* ── MODALS ── */

.overlay.open{display:flex}
.mbox{background:#fff;border-radius:10px;width:640px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);margin-bottom:20px}
.mbox.wide{width:760px}
.mhd{padding:15px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhd h3{font-size:15px;font-weight:700}
.mclose{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.mbody{padding:18px 20px;overflow-y:auto;flex:1}
.mft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);outline:none;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
.fld-note{font-size:10px;color:var(--text2);margin-top:2px}
.fld-pre{background:#F8F9FA!important;color:var(--text2)!important}
.msec{font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ── WAFER CHECKBOXES ── */
.wafer-bar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.wafer-bar span{font-size:12px;color:var(--text2)}
.wafer-grid{display:flex;flex-wrap:wrap;gap:4px;padding:10px;background:#F8F9FA;border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;margin-bottom:12px}
.wcb-label{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:4px;font-size:12px;cursor:pointer;background:#fff;border:1px solid var(--border);font-family:monospace;transition:.1s;user-select:none}
.wcb-label:hover{border-color:var(--primary);background:#F0F3FF}
.wcb-label.checked{background:#EEF2FF;border-color:var(--primary);color:var(--primary);font-weight:600}
.wcb-label.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ── PARSE ── */
.parse-area{width:100%;height:110px;resize:vertical;font-family:monospace;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:8px;outline:none}
.parse-area:focus{border-color:var(--primary)}
.parse-ok{color:var(--green);font-size:13px;font-weight:600;margin-bottom:8px}
.parse-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px}
.parse-table th{background:#F3F5F8;padding:6px 10px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.parse-table td{padding:6px 10px;border-bottom:1px solid #F0F2F5}
.parse-table tr:last-child td{border-bottom:none;font-weight:600;background:#F8F9FA}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:.15s}

.upload-title{font-size:14px;font-weight:500;margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--text2)}
.upload-sub a{color:var(--primary);cursor:pointer;text-decoration:underline}

<script>
/* ─── PROJECTS ─── */
const PROJECTS=[
  {id:0,customer:'Samsung',name:'SI0136A',alCode:'BX4K72A',cls:'MPW',qty:40,unit:'EA',tmCode:'TMWC09_C16',netDie:'',scmFlow:['FAB']},

  {id:2,customer:'LG Electronics',name:'Ratel_N1C',alCode:'PJ2H67A',cls:'Production Wafer',qty:6,unit:'PCS',tmCode:'TMMQ65',netDie:'1200',scmFlow:['FAB','ASSEMBLY','FT']},
  {id:3,customer:'Samsung',name:'FALCON_N1B',alCode:'QN8L44A',cls:'Production Wafer',qty:50,unit:'PCS',tmCode:'TMSV86',netDie:'',scmFlow:['FAB']},
  {id:4,customer:'LG Electronics',name:'Tachy-BS4_N1A',alCode:'HL6T38A',cls:'Production Wafer',qty:20,unit:'PCS',tmCode:'TMUE69',netDie:'620',scmFlow:['FAB','FT']},
];

/* ─── RECORDS ─── */
let nextId=100;
const RECORDS=[
  /* MPW SI0136A FAB IN */
  {id:1,pid:0,step:'FAB',dir:'IN',ver:'A',date:'2026-01-25',startQty:40,remark:'초도 투입'},
  /* MPW FAB OUT — parentId:1, parsed from TSMC invoice */
  {id:2,pid:0,step:'FAB',dir:'OUT',parentId:1,ver:'A',date:'2026-05-06',
   invoiceNo:'0K64260506VY',
   items:[
     {itemNo:1,productName:'SI0136A',chipId:'G6X997.1#1',qty:20,unit:'EA'},
     {itemNo:2,productName:'SI0136A',chipId:'G6X997.1#2',qty:20,unit:'EA'},
   ],
   totalQty:40,unit:'EA',status:'완료',direction:'고객출하',remark:''},

  /* Pilot ANA38413 FAB IN — waferNos as array */
  {id:3,pid:1,step:'FAB',dir:'IN',ver:'A',date:'2026-02-20',
   lotId:'LOT-2602-001',qty:5,waferNos:[1,2,3,4,5],
   status:'진행중',direction:'다음step',reject:0,yld:'',remark:''},
  /* Pilot FAB OUT — parentId:3, 5장 중 5장 선택 */
  {id:4,pid:1,step:'FAB',dir:'OUT',parentId:3,ver:'A',date:'2026-03-28',
   lotId:'LOT-2602-001',qty:5,waferNos:[1,2,3,4,5],
   status:'완료',direction:'다음step',reject:0,yld:'99.50',remark:''},
  /* Pilot CP Lot */
  {id:5,pid:1,step:'CP',dir:'LOT',lotId:'LOT-2602-001',waferNos:[1,2,3,4,5],
   receiveDate:'2026-04-01',startDate:'2026-04-03',endDate:'2026-04-20',
   inQtyPcs:5,inQtyEa:74500,outQtyPcs:5,outQtyEa:73850,reject:650,yld:'99.13',status:'완료',direction:'고객출하',remark:''},
];

/* ─── STATE ─── */
let selPid=-1,selStep='',sbQuery='';
let mCtx={};
let parsedItems=[],excelRows=[],editLotId=null;

/* ─── WAFER HELPERS ─── */
/* [1,2,3,4,5,7,8] → "#1-5, #7-8" */
function wafersToStr(arr){
  if(!arr||!arr.length) return '';
  const s=[...arr].sort((a,b)=>a-b);
  const ranges=[];
  let st=s[0],pr=s[0];
  for(let i=1;i<=s.length;i++){
    if(i<s.length&&s[i]===pr+1){pr=s[i];}
    else{ranges.push(st===pr?`#${st}`:`#${st}-${pr}`);if(i<s.length){st=s[i];pr=s[i];}}
  }
  return ranges.join(', ');
}

/* render wafer checkboxes for selection */
function waferCheckboxesHtml(nums, cbClass, allChecked=true){
  return nums.map(n=>`
    <label class="wcb-label ${allChecked?'checked':''}" id="wcl-${cbClass}-${n}" onclick="toggleWcb(this,'${cbClass}',${n})">
      <input type="checkbox" style="display:none" ${allChecked?'checked':''}>#${String(n).padStart(2,'0')}
    </label>`).join('');
}

function toggleWcb(el,cls,n){
  el.classList.toggle('checked');
}

function getChecked(cbClass){
  return [...document.querySelectorAll(`.wcb-label[id^="wcl-${cbClass}-"].checked`)]
    .map(el=>parseInt(el.id.split('-').pop())).sort((a,b)=>a-b);
}

function selectAllWcb(cbClass,checked){
  document.querySelectorAll(`.wcb-label[id^="wcl-${cbClass}-"]`).forEach(el=>{
    checked?el.classList.add('checked'):el.classList.remove('checked');
  });
}

/* ─── TSMC INVOICE PARSER ─── */
function parseTSMCInvoice(text){
  const lines=text.split('\n');
  const items=[];
  let invoiceNo='',invoiceDate='';

  const invM=text.match(/INVOICE NO\.\:\s*(\S+)/);
  const dateM=text.match(/INVOICE DATE\:\s*([\d\/]+)/);
  if(invM) invoiceNo=invM[1];
  if(dateM) invoiceDate=dateM[1];

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    /* item header: "    1  AL-MPW-..." */
    const itemM=line.match(/^\s{2,5}(\d+)\s{2,4}(AL-\S+)\s/);
    if(!itemM) continue;
    const itemNo=parseInt(itemM[1]);
    let productName='',tmCode='',qty=0,unit='EA',chipId='';

    for(let j=i+1;j<Math.min(i+10,lines.length);j++){
      const raw=lines[j];
      const l=raw.trim();
      if(!l) continue;
      /* stop at next item or separator */
      if(/^\s{2,5}\d+\s{2,4}AL-/.test(raw)&&j>i) break;
      if(l.startsWith('---')||l.startsWith('GRAND')||l.startsWith('TOTAL')) break;

      /* product + tmCode line: "   SI0136A    TMWC09_C16" */
      if(!productName){
        const pm=raw.match(/^\s{5,}(\w+)\s{4,}(\w+)\s*$/);
        if(pm){productName=pm[1];tmCode=pm[2];continue;}
      }
      /* qty line: "   20  EA" */
      const qm=l.match(/^(\d+)\s+(EA|PCS)$/);
      if(qm){qty=parseInt(qm[1]);unit=qm[2];continue;}
      /* chipId: "G6X997.1#1" — alphanumeric with . or - and ending in #N */
      const cm=l.match(/^(\S+#\d+)$/);
      if(cm&&!chipId){chipId=cm[1];}
    }

    if(qty>0) items.push({itemNo,productName,tmCode,qty,unit,chipId});
  }
  return {invoiceNo,invoiceDate,items};
}

/* ─── GENERAL HELPERS ─── */
function clsBadge(cls){
  if(cls==='MPW') return '<span class="badge b-mpw">MPW</span>';
  if(cls==='Pilot Wafer') return '<span class="badge b-pilot">Pilot</span>';
  return '<span class="badge b-prod">Prod</span>';
}
function stPill(s){return s?`<span class="st-pill st-${s}">${s}</span>`:'—';}
function dirPill(d){return d?`<span class="dir-pill">${d}</span>`:'—';}
function dash(v){return (v!==undefined&&v!==null&&v!=='')? v:'—';}
function v(id){return document.getElementById(id)?.value??'';}
function num(id){const x=v(id);return x===''?null:Number(x);}
function delRec(id){RECORDS.splice(RECORDS.findIndex(r=>r.id===id),1);rerenderPanel();}
function rerenderPanel(){const p=PROJECTS.find(x=>x.id===selPid);if(p)renderPanel(p);}

/* ─── MODAL ─── */
function closeM(id){document.getElementById(id).classList.remove('open');}
['ov-fi','ov-fo','ov-lot','ov-xl'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)closeM(id);});
});

/* ─── SIDEBAR ─── */
function filterSb(q){sbQuery=q;renderSidebar();}
function renderSidebar(){
  const q=sbQuery.toLowerCase();
  const list=PROJECTS.filter(p=>!q||p.name.toLowerCase().includes(q)||p.alCode.toLowerCase().includes(q));
  document.getElementById('sb-list').innerHTML=list.map(p=>`
    <div class="sb-item ${selPid===p.id?'active':''}" onclick="selectProj(${p.id})">
      <div class="sb-name">${p.name} ${clsBadge(p.cls)}</div>
      <div class="sb-meta">${p.alCode} · ${p.customer}</div>
    </div>`).join('');
}

function selectProj(pid){
  selPid=pid;
  const p=PROJECTS.find(x=>x.id===pid);
  renderSidebar();
  document.getElementById('no-proj').style.display='none';
  const pv=document.getElementById('proj-view');
  pv.style.display='flex';
  document.getElementById('pv-name').textContent=p.name;
  document.getElementById('pv-meta').innerHTML=`
    ${clsBadge(p.cls)}
    <span><strong>AL Code</strong> <span style="font-family:monospace">${p.alCode}</span></span>
    <span><strong>TM Code</strong> ${p.tmCode||'—'}</span>
    <span><strong>Net Die</strong> ${p.netDie||'—'}</span>
    <span><strong>고객사</strong> ${p.customer}</span>
    <span><strong>총 Start Qty</strong> ${p.qty} ${p.unit}</span>`;
  if(!p.scmFlow.includes(selStep)) selStep=p.scmFlow[0];
  renderTabs(p);renderPanel(p);
}
function renderTabs(p){
  document.getElementById('tab-bar').innerHTML=p.scmFlow.map(s=>
    `<div class="tab ${selStep===s?'on':''}" onclick="selTab('${s}')">${s}</div>`).join('');
}
function selTab(s){selStep=s;const p=PROJECTS.find(x=>x.id===selPid);renderTabs(p);renderPanel(p);}
function renderPanel(p){
  document.getElementById('panel').innerHTML=selStep==='FAB'?buildFabSection(p):buildLotSection(p,selStep);
}

/* ══════════════════════════════════════
   FAB SECTION
══════════════════════════════════════ */
function buildFabSection(p){
  const mpw=p.cls==='MPW';
  const inRecs=RECORDS.filter(r=>r.pid===p.id&&r.step==='FAB'&&r.dir==='IN');

  const thMPW=`<th>구분</th><th>Ver</th><th>날짜</th><th>Start Qty</th><th>Invoice No.</th><th>품목 내역</th><th>출하 합계</th><th>상태</th><th>처리방향</th><th>Remark</th><th></th>`;
  const thWafer=`<th>구분</th><th>Ver</th><th>날짜</th><th>Lot ID</th><th>Qty</th><th>Wafer No.</th><th>상태</th><th>처리방향</th><th>Reject</th><th>YLD%</th><th>Remark</th><th></th>`;
  const cols=mpw?11:12;
  let rows='';
  if(!inRecs.length){
    rows=`<tr><td colspan="${cols}" class="empty-row">등록된 FAB 기록이 없습니다</td></tr>`;
  } else {
    inRecs.forEach(inR=>{
      rows+=buildFabInRow(inR,mpw);
      RECORDS.filter(r=>r.pid===p.id&&r.step==='FAB'&&r.dir==='OUT'&&r.parentId===inR.id)
             .forEach(outR=>{rows+=buildFabOutRow(outR,mpw);});
    });
  }
  return `<div class="section">
    <div class="sec-hd">
      <span class="sec-title">FAB 입출하 기록</span>
      <button class="btn btn-primary btn-sm" onclick="openFabIn(${p.id})">+ IN 추가</button>
    </div>
    <div class="rec-wrap">
      <table class="rec"><thead><tr>${mpw?thMPW:thWafer}</tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

function buildFabInRow(r,mpw){
  const acts=`<div class="actions">
    <button class="btn btn-xs btn-out" onclick="openFabOut(${r.id})">OUT 등록</button>
    <button class="btn btn-xs btn-danger" onclick="delRec(${r.id})">삭제</button>
  </div>`;
  if(mpw){
    return `<tr class="in-row">
      <td><span class="type-in">IN</span></td>
      <td>${r.ver}</td><td>${r.date}</td>
      <td><strong>${r.startQty}</strong> EA</td>
      <td colspan="3" style="color:var(--text2);font-size:11px">OUT 미등록</td>
      <td>—</td><td>—</td><td>${r.remark||''}</td><td>${acts}</td>
    </tr>`;
  }
  return `<tr class="in-row">
    <td><span class="type-in">IN</span></td>
    <td>${r.ver}</td><td>${r.date}</td>
    <td class="rec-mono">${r.lotId||''}</td>
    <td>${r.qty||''}</td>
    <td class="rec-mono" style="font-size:11px">${wafersToStr(r.waferNos)}</td>
    <td>${stPill(r.status)}</td><td>${dirPill(r.direction)}</td>
    <td>${dash(r.reject)}</td><td>${r.yld?r.yld+'%':'—'}</td>
    <td>${r.remark||''}</td><td>${acts}</td>
  </tr>`;
}

function buildFabOutRow(r,mpw){
  const delBtn=`<button class="btn btn-xs btn-danger" onclick="delRec(${r.id})">삭제</button>`;
  if(mpw){
    const items=r.items||[];
    const detail=items.map(i=>`<span style="font-family:monospace;font-size:11px">${i.chipId} <span style="color:var(--text2)">(${i.qty}${i.unit})</span></span>`).join('<br>');
    const total=r.totalQty?`<strong>${r.totalQty}</strong> ${r.unit}`:'—';
    return `<tr class="out-row">
      <td><span class="type-out">OUT</span></td>
      <td>${r.ver}</td><td>${r.date}</td>
      <td>—</td>
      <td class="rec-mono" style="font-size:11px">${r.invoiceNo||''}</td>
      <td>${detail||'—'}</td>
      <td>${total}</td>
      <td>${stPill(r.status)}</td><td>${dirPill(r.direction)}</td>
      <td>${r.remark||''}</td><td>${delBtn}</td>
    </tr>`;
  }
  return `<tr class="out-row">
    <td><span class="type-out">OUT</span></td>
    <td>${r.ver}</td><td>${r.date}</td>
    <td class="rec-mono">${r.lotId||''}</td>
    <td>${r.qty||''}</td>
    <td class="rec-mono" style="font-size:11px">${wafersToStr(r.waferNos)}</td>
    <td>${stPill(r.status)}</td><td>${dirPill(r.direction)}</td>
    <td>${dash(r.reject)}</td><td>${r.yld?r.yld+'%':'—'}</td>
    <td>${r.remark||''}</td><td>${delBtn}</td>
  </tr>`;
}

/* ══════════════════════════════════════
   POST-FAB SECTION
══════════════════════════════════════ */
function buildLotSection(p,step){
  const lots=RECORDS.filter(r=>r.pid===p.id&&r.step===step&&r.dir==='LOT');
  const th=`<th>Lot ID</th><th>Wafer No.</th><th>입고일</th><th>시작일</th><th>종료일</th>
    <th>In(PCS)</th><th>In(EA)</th><th>Out(PCS)</th><th>Out(EA)</th>
    <th>Reject</th><th>YLD%</th><th>상태</th><th>처리방향</th><th>Remark</th><th></th>`;
  const tbody=lots.length
    ?lots.map(r=>`<tr>
        <td class="rec-mono">${r.lotId}</td>
        <td class="rec-mono" style="font-size:11px">${wafersToStr(r.waferNos)||r.waferStr||'—'}</td>
        <td>${r.receiveDate||'—'}</td><td>${r.startDate||'—'}</td><td>${r.endDate||'—'}</td>
        <td>${dash(r.inQtyPcs)}</td><td>${r.inQtyEa!=null?(+r.inQtyEa).toLocaleString():'—'}</td>
        <td>${dash(r.outQtyPcs)}</td><td>${r.outQtyEa!=null?(+r.outQtyEa).toLocaleString():'—'}</td>
        <td>${dash(r.reject)}</td><td>${r.yld?r.yld+'%':'—'}</td>
        <td>${stPill(r.status)}</td><td>${dirPill(r.direction)}</td>
        <td>${r.remark||''}</td>
        <td><div class="actions">
          <button class="btn btn-xs btn-ghost" onclick="openLotEdit(${r.id})">편집</button>
          <button class="btn btn-xs btn-danger" onclick="delRec(${r.id})">삭제</button>
        </div></td>
      </tr>`).join('')
    :`<tr><td colspan="15" class="empty-row">등록된 Lot 기록이 없습니다</td></tr>`;
  return `<div class="section">
    <div class="sec-hd">
      <span class="sec-title">${step} Lot 기록</span>
      <div class="actions">
        <button class="btn btn-primary btn-sm" onclick="openLot(${p.id},'${step}',null)">+ Lot 추가</button>
        <button class="btn btn-ghost btn-sm" onclick="openExcel(${p.id},'${step}')">Excel 업로드</button>
      </div>
    </div>
    <div class="rec-wrap">
      <table class="rec"><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table>
    </div>
  </div>`;
}

function genWaferGrid(val,cbClass){
  const n=parseInt(val);
  const wrap=document.getElementById(`${cbClass.replace('-wafer','')}-wafer-wrap`)||document.getElementById('fi-wafer-wrap');
  if(!n||n<1){if(wrap)wrap.style.display='none';return;}
  const grid=document.getElementById(`${cbClass}-grid`)||document.getElementById('fi-wafer-grid');
  grid.innerHTML=waferCheckboxesHtml(Array.from({length:n},(_,i)=>i+1),cbClass,true);
  if(wrap)wrap.style.display='block';
  updateWaferCount(cbClass);
}

function updateWaferCount(cbClass){
  const cnt=document.querySelectorAll(`.wcb-label[id^="wcl-${cbClass}-"].checked`).length;
  const el=document.getElementById(`${cbClass.replace('-wafer','')}-wcnt`)||document.getElementById('fi-wcnt');
  if(el) el.textContent=`${cnt}장 선택`;
}

function saveFabIn(){
  const rec={id:nextId++,pid:mCtx.pid,step:'FAB',dir:'IN'};
  rec.ver=v('fi-ver')||'A';rec.date=v('fi-date');rec.remark=v('fi-remark');
  if(mCtx.mpw){
    rec.startQty=Number(v('fi-startqty'))||0;
  } else {
    rec.lotId=v('fi-lotid');
    const qty=parseInt(v('fi-qty'))||0;
    rec.qty=qty;
    rec.waferNos=getChecked('fi-wafer');
    if(!rec.waferNos.length) rec.waferNos=Array.from({length:qty},(_,i)=>i+1);
  }
  RECORDS.push(rec);closeM('ov-fi');rerenderPanel();
}

function loadParseFile(input){
  if(!input.files[0]) return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('fo-text').value=e.target.result;runParse();};
  r.readAsText(input.files[0]);
}

       SI0136A             TMWC09_C16

                           Chip
    2  AL-MPW-20260129-11  0K6426011499

function runParse(){
  const text=document.getElementById('fo-text')?.value||'';
  const result=parseTSMCInvoice(text);
  parsedItems=result.items;

  if(!parsedItems.length){
    document.getElementById('fo-parse-result').innerHTML=
      `<div style="color:var(--red);font-size:13px;margin-bottom:8px">⚠ 파싱 결과 없음 — Invoice 형식을 확인해주세요</div>`;
    return;
  }
  const total=parsedItems.reduce((a,i)=>a+i.qty,0);
  const unit=parsedItems[0]?.unit||'EA';
  const rows=parsedItems.map(i=>`<tr>
    <td>${i.itemNo}</td>
    <td style="font-weight:500">${i.productName||'—'}</td>
    <td class="rec-mono">${i.chipId||'—'}</td>
    <td style="text-align:right">${i.qty}</td>
    <td>${i.unit}</td>
  </tr>`).join('');
  document.getElementById('fo-parse-result').innerHTML=`
    <div class="parse-ok">✅ ${parsedItems.length}항목 파싱 완료 ${result.invoiceNo?'— Invoice: '+result.invoiceNo:''}</div>
    <table class="parse-table">
      <thead><tr><th>#</th><th>제품명</th><th>Chip ID</th><th style="text-align:right">수량</th><th>단위</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="3">합계</td><td style="text-align:right">${total}</td><td>${unit}</td></tr></tfoot>
    </table>`;
}

function saveFabOut(){
  const rec={id:nextId++,pid:mCtx.pid,step:'FAB',dir:'OUT',parentId:mCtx.parentInId};
  rec.ver=v('fo-ver')||'A'; rec.date=v('fo-date'); rec.remark=v('fo-remark');
  rec.status=v('fo-status'); rec.direction=v('fo-direction');
  if(mCtx.mpw){
    if(!parsedItems.length&&!confirm('파싱 결과가 없습니다. 그래도 저장할까요?')) return;
    rec.invoiceNo=parsedItems[0]?
      (document.getElementById('fo-text')?.value.match(/INVOICE NO\.\:\s*(\S+)/)||[])[1]||'':'';
    rec.items=[...parsedItems];
    rec.totalQty=parsedItems.reduce((a,i)=>a+i.qty,0);
    rec.unit=parsedItems[0]?.unit||'EA';
  } else {
    const wafers=getChecked('fo-wafer');
    rec.lotId=v('fo-lotid');
    rec.qty=wafers.length;
    rec.waferNos=wafers;
    rec.reject=v('fo-reject')?Number(v('fo-reject')):null;
    rec.yld=v('fo-yld');
  }
  if(!rec.date){alert('날짜를 입력해주세요.');return;}
  RECORDS.push(rec);closeM('ov-fo');rerenderPanel();
}

    </div>
    <div class="fg c4">
      <div class="field"><label>In Qty (PCS)</label><input id="l-inpcs" type="number" min="0" value="${r.inQtyPcs??''}"></div>
      <div class="field"><label>In Qty (EA)</label><input id="l-inea" type="number" min="0" value="${r.inQtyEa??''}"></div>
      <div class="field"><label>Out Qty (PCS)</label><input id="l-outpcs" type="number" min="0" value="${r.outQtyPcs??''}"></div>
      <div class="field"><label>Out Qty (EA)</label><input id="l-outea" type="number" min="0" value="${r.outQtyEa??''}"></div>
    </div>
    <div class="fg c3">
      <div class="field"><label>Reject</label><input id="l-reject" type="number" min="0" value="${r.reject??''}"></div>
      <div class="field"><label>YLD (%)</label><input id="l-yld" placeholder="98.5" value="${r.yld||''}"></div>
      <div class="field"></div>
    </div>
    <div class="fg">
      <div class="field"><label>상태</label>
        <select id="l-status">${['진행중','완료','scrap'].map(o=>`<option ${r.status===o?'selected':''}>${o}</option>`).join('')}</select></div>
      <div class="field"><label>처리방향</label>
        <select id="l-direction">${['다음step','고객출하','보관','기타'].map(o=>`<option ${r.direction===o?'selected':''}>${o}</option>`).join('')}</select></div>
    </div>
    <div class="fg full"><div class="field"><label>Remark</label><input id="l-remark" value="${r.remark||''}" placeholder="Remark"></div></div>`;
  document.getElementById('ov-lot').classList.add('open');
}
function openLotEdit(id){const r=RECORDS.find(x=>x.id===id);openLot(r.pid,r.step,id);}

function genLotWaferGrid(val){
  const n=parseInt(val);
  const wrap=document.getElementById('l-wafer-wrap');
  const grid=document.getElementById('l-wafer-grid');
  if(!n||n<1){wrap.style.display='none';return;}
  grid.innerHTML=waferCheckboxesHtml(Array.from({length:n},(_,i)=>i+1),'l-wafer',true);
  wrap.style.display='block';
}

function saveLot(){
  const rec={step:mCtx.step,dir:'LOT',pid:mCtx.pid,
    lotId:v('l-lotid'),
    receiveDate:v('l-receive'),startDate:v('l-start'),endDate:v('l-end'),
    inQtyPcs:num('l-inpcs'),inQtyEa:num('l-inea'),
    outQtyPcs:num('l-outpcs'),outQtyEa:num('l-outea'),
    reject:num('l-reject'),yld:v('l-yld'),
    status:v('l-status'),direction:v('l-direction'),remark:v('l-remark')};
  const wafers=getChecked('l-wafer');
  if(wafers.length){rec.waferNos=wafers;rec.qty=wafers.length;}
  if(!rec.lotId){alert('Lot ID를 입력해주세요.');return;}
  if(editLotId){Object.assign(RECORDS.find(x=>x.id===editLotId),rec);}
  else{rec.id=nextId++;RECORDS.push(rec);}
  closeM('ov-lot');rerenderPanel();
}

/* ══════════════════════════════════════
   EXCEL MODAL
══════════════════════════════════════ */
function openExcel(pid,step){
  mCtx={type:'excel',pid,step};
  excelRows=[];
  document.getElementById('xl-title').textContent=`${step} Excel 업로드`;
  document.getElementById('xl-save-btn').style.display='none';
  document.getElementById('xl-body').innerHTML=`
    <div class="upload-area" onclick="document.getElementById('xl-file').click()">
      <input type="file" id="xl-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcel(this)">
      <div class="upload-title">📂 파일 선택 또는 드래그</div>
      <div class="upload-sub">.xlsx / .xls / .csv &nbsp;|&nbsp; <a onclick="event.stopPropagation();demoExcel()">데모 데이터 로드</a></div>
    </div>
    <div id="xl-preview"></div>`;
  document.getElementById('ov-xl').classList.add('open');
}
function handleExcel(i){if(i.files[0])demoExcel();}
function demoExcel(){
  excelRows=[
    {lotId:'LOT-DEMO-001',waferNos:[1,2,3],receiveDate:'2026-05-01',startDate:'2026-05-03',endDate:'2026-05-20',
     inQtyPcs:3,inQtyEa:45000,outQtyPcs:3,outQtyEa:44350,reject:650,yld:'98.56',status:'완료',direction:'고객출하'},
    {lotId:'LOT-DEMO-002',waferNos:[4,5,6],receiveDate:'2026-05-01',startDate:'2026-05-03',endDate:'',
     inQtyPcs:3,inQtyEa:45000,outQtyPcs:null,outQtyEa:null,reject:null,yld:'',status:'진행중',direction:'다음step'},
  ];
  const rows=excelRows.map((r,i)=>`<tr>
    <td>${i+1}</td><td class="rec-mono">${r.lotId}</td>
    <td class="rec-mono">${wafersToStr(r.waferNos)}</td>
    <td>${r.receiveDate}</td><td>${r.startDate}</td><td>${r.endDate||'—'}</td>
    <td>${r.inQtyPcs}</td><td>${r.inQtyEa?.toLocaleString()}</td>
    <td>${r.outQtyPcs??'—'}</td><td>${r.outQtyEa?.toLocaleString()??'—'}</td>
    <td>${r.reject??'—'}</td><td>${r.yld?r.yld+'%':'—'}</td>
    <td>${r.status}</td><td>${r.direction}</td>
  </tr>`).join('');
  document.getElementById('xl-preview').innerHTML=`
    <div class="parse-ok" style="margin-bottom:8px">✅ ${excelRows.length}건 로드됨</div>
    <div style="overflow-x:auto"><table class="rec">
      <thead><tr><th>#</th><th>Lot ID</th><th>Wafer No.</th><th>입고일</th><th>시작일</th><th>종료일</th>
        <th>In(PCS)</th><th>In(EA)</th><th>Out(PCS)</th><th>Out(EA)</th>
        <th>Reject</th><th>YLD%</th><th>상태</th><th>처리방향</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  document.getElementById('xl-save-btn').style.display='inline-block';
}
function saveExcel(){
  excelRows.forEach(r=>RECORDS.push({id:nextId++,pid:mCtx.pid,step:mCtx.step,dir:'LOT',...r}));
  closeM('ov-xl');rerenderPanel();
}

renderSidebar();
</script>
