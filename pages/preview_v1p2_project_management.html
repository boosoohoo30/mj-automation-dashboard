<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>생산관리 - 생산과제관리</title>
<style>
:root{
  --color-text-primary:#1a1917;--color-text-secondary:#6b6a66;
  --color-background-primary:#fff;--color-background-secondary:#f5f4f0;
  --color-border-primary:#b0afa9;--color-border-secondary:#d0cfc9;--color-border-tertiary:#e5e4df;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
  --border-radius-sm:4px;--border-radius-md:6px;--border-radius-lg:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-size:14px;color:var(--color-text-primary);font-family:var(--font-sans);background:#f5f4f0}
.shell{max-width:1200px;margin:0 auto;padding:24px 32px;background:#fff;min-height:100vh}

/* 헤더 */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:600}

/* 검색 */
.search-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:18px}
.search-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500}
.search-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:10px}
input.si,select.si{width:100%;padding:6px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
input.si:focus,select.si:focus{outline:none;border-color:#185FA5}

/* 버튼 */
.btn{padding:6px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.xs{padding:3px 9px;font-size:11px}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0E4A85}
.btn.danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.danger:hover{background:#7A1F1F}
.btn.warn{background:#fff;color:#D97706;border-color:#D97706}
.btn.warn:hover{background:#FFFBEB}
.btn.reset{color:var(--color-text-secondary)}

/* 메트릭 */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 16px;border:0.5px solid var(--color-border-tertiary)}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:600}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

/* 툴바 */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.toolbar-info{font-size:12px;color:var(--color-text-secondary)}

/* 테이블 */
.tbl-outer{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:16px}
table.main{width:100%;border-collapse:collapse;font-size:12px}
table.main th{padding:7px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
table.main td{padding:9px 12px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle;white-space:nowrap}
table.main tr:last-child td{border-bottom:none}
tr.row-active:hover td{background:#fafaf8}
tr.row-closed td{opacity:.5}
tr.row-closed:hover td{opacity:.7;background:#f5f4f0}

/* 배지 */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-active{background:#EAF3DE;color:#27500A}
.b-closed{background:#F1EFE8;color:#5F5E5A}
.b-fab{background:#E6F1FB;color:#0C447C}
.b-bump{background:#EDE9FF;color:#4A3AAA}
.b-cp{background:#FEF3E2;color:#92400E}
.b-assembly{background:#FAEEDA;color:#7A3D00}
.b-ft{background:#E6F9F1;color:#0C5E3F}
.b-dps{background:#F1EFE8;color:#5F5E5A}
.b-pm{background:#FEF3E2;color:#92400E;font-size:10px;padding:1px 6px}
.b-pm-none{background:#F1EFE8;color:#9b9a96;font-size:10px;padding:1px 6px}
.mono{font-family:var(--font-mono);font-size:11px}

/* SCM Flow */
.scm-flow{display:flex;gap:3px;flex-wrap:wrap}

/* 모달 공통 */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:none;align-items:center;justify-content:center}
.backdrop.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);width:560px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.14)}
.modal-sm{width:380px}
.modal-header{padding:14px 20px;border-bottom:.5px solid var(--color-border-tertiary);font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.modal-close{padding:0 4px;font-size:20px;border:none;background:none;color:var(--color-text-secondary);cursor:pointer;line-height:1}
.modal-body{padding:20px;display:grid;gap:14px}
.modal-footer{padding:12px 20px;border-top:.5px solid var(--color-border-tertiary);display:flex;justify-content:flex-end;gap:8px}

/* 폼 */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:500;color:var(--color-text-secondary)}
.form-req{color:#A32D2D;font-size:10px}
input.fi,select.fi,textarea.fi{padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
input.fi:focus,select.fi:focus,textarea.fi:focus{outline:none;border-color:#185FA5}
input.fi.err,select.fi.err{border-color:#A32D2D}
textarea.fi{height:56px;resize:none;font-family:var(--font-sans)}

/* SCM 체크박스 */
.step-checks{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.step-lbl{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;user-select:none;font-size:12px;color:var(--color-text-secondary);transition:all .1s}
.step-lbl:hover{background:var(--color-background-secondary)}
.step-lbl.on{border-color:#185FA5;background:#E6F1FB;color:#185FA5;font-weight:500}
.step-lbl input[type=checkbox]{display:none}

/* 확인 모달 본문 */
.confirm-body{padding:20px;font-size:13px;line-height:1.65;color:var(--color-text-secondary)}
.confirm-body strong{color:var(--color-text-primary)}

/* 필터 요약 */
#filter-summary{font-size:11px;color:var(--color-text-secondary)}
</style>
</head>
<body>
<div class="shell">

<div class="page-header">
  <div class="page-title">생산관리 — 생산과제관리</div>
  <button class="btn primary" onclick="openAddModal()">+ 과제 등록</button>
</div>

<!-- 검색 -->
<div class="search-box">
  <div class="search-grid">
    <div><div class="search-label">과제명</div><input class="si" id="f-proj" placeholder="과제명" oninput="render()"></div>
    <div><div class="search-label">고객사</div><input class="si" id="f-cust" placeholder="고객사명" oninput="render()"></div>
    <div><div class="search-label">AM</div>
      <select class="si" id="f-am" onchange="render()">
        <option value="">전체</option>
        <option>DJ</option><option>SY</option><option>JH</option>
      </select>
    </div>
    <div><div class="search-label">PM</div><input class="si" id="f-pm" placeholder="PM 이름" oninput="render()"></div>
    <div><div class="search-label">상태</div>
      <select class="si" id="f-status" onchange="render()">
        <option value="active">활성 과제</option>
        <option value="">전체 (종료 포함)</option>
        <option value="closed">종료 과제만</option>
      </select>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div id="filter-summary"></div>
    <div style="display:flex;gap:8px">
      <button class="btn sm reset" onclick="resetSearch()">초기화</button>
      <button class="btn sm primary" onclick="render()">검색</button>
    </div>
  </div>
</div>

<!-- 메트릭 -->
<div class="metrics" id="metrics"></div>

<!-- 툴바 -->
<div class="toolbar">
  <span class="toolbar-info" id="toolbar-info"></span>
</div>

<!-- 테이블 -->
<div class="tbl-outer">
  <table class="main">
    <thead>
      <tr>
        <th style="width:170px">과제명</th>
        <th style="width:110px">고객사</th>
        <th style="width:90px">AL코드</th>
        <th style="width:44px">AM</th>
        <th style="width:90px">PM</th>
        <th>SCM Flow</th>
        <th style="width:110px;text-align:right">FAB Start Qty <span style="font-weight:400;font-size:10px">(합산)</span></th>
        <th style="width:80px">등록일</th>
        <th style="width:60px;text-align:center">상태</th>
        <th style="width:130px;text-align:center">액션</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

</div>

<!-- ══ 과제 등록/수정 모달 ══ -->
<div class="backdrop" id="edit-backdrop">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">과제 등록</span>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">과제명 <span class="form-req">*</span></label>
          <input class="fi" id="m-proj" placeholder="예: UC60Plus C4">
        </div>
        <div class="form-group">
          <label class="form-label">고객사 <span class="form-req">*</span></label>
          <input class="fi" id="m-cust" placeholder="예: Uniqconn">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">AL코드</label>
          <input class="fi" id="m-alcode" placeholder="예: BX4K72A">
        </div>
        <div class="form-group">
          <label class="form-label">AM <span class="form-req">*</span></label>
          <select class="fi" id="m-am">
            <option value="">선택</option>
            <option>DJ</option><option>SY</option><option>JH</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">PM</label>
          <input class="fi" id="m-pm" placeholder="PM 이름 (선택)">
        </div>
        <div class="form-group" style="justify-content:flex-start"><!-- spacer --></div>
      </div>
      <div class="form-group">
        <label class="form-label">SCM Flow <span class="form-req">*</span>
          <span style="font-weight:400;color:var(--color-text-secondary)"> — 해당 단계 선택 (순서 고정)</span>
        </label>
        <div class="step-checks" id="m-scm-checks"></div>
        <div id="m-scm-err" style="font-size:11px;color:#A32D2D;display:none">최소 1단계 이상 선택해주세요.</div>
      </div>
      <div class="form-group">
        <label class="form-label">비고</label>
        <textarea class="fi" id="m-note" placeholder="기타 메모 (선택)"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn sm" onclick="closeEditModal()">취소</button>
      <button class="btn sm primary" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<!-- ══ 종료 확인 모달 ══ -->
<div class="backdrop" id="close-backdrop">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span>과제 종료 처리</span>
      <button class="modal-close" onclick="cancelClose()">×</button>
    </div>
    <div class="confirm-body" id="close-desc"></div>
    <div class="modal-footer">
      <button class="btn sm" onclick="cancelClose()">취소</button>
      <button class="btn sm danger" onclick="confirmClose()">종료 처리</button>
    </div>
  </div>
</div>

<!-- ══ 재개 확인 모달 ══ -->
<div class="backdrop" id="reopen-backdrop">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span>과제 재개</span>
      <button class="modal-close" onclick="cancelReopen()">×</button>
    </div>
    <div class="confirm-body" id="reopen-desc"></div>
    <div class="modal-footer">
      <button class="btn sm" onclick="cancelReopen()">취소</button>
      <button class="btn sm primary" onclick="confirmReopen()">재개</button>
    </div>
  </div>
</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────────────
const SCM_STEPS = ['FAB','BUMP','CP','ASSEMBLY','FT','DPS'];
const STEP_BADGE = {FAB:'b-fab',BUMP:'b-bump',CP:'b-cp',ASSEMBLY:'b-assembly',FT:'b-ft',DPS:'b-dps'};

// ── 과제 데이터 ───────────────────────────────────────────────────────────
let PROJECTS = [
  { id:1, project:'UC60Plus C4', customer:'Uniqconn', alCode:'BX4K72A', pm:'JH', am:'DJ',
    scmFlow:['FAB','BUMP','ASSEMBLY','FT'], status:'active', createdAt:'2025-10-14', closedAt:null, note:'' },
  { id:2, project:'Albatross_N1B', customer:'Fadu', alCode:'TR9M21A', pm:null, am:'SY',
    scmFlow:['FAB','CP','FT'], status:'active', createdAt:'2026-01-01', closedAt:null, note:'' },
  { id:3, project:'Ratel_N1C', customer:'KAIST', alCode:'RT8C11B', pm:'SH', am:'DJ',
    scmFlow:['FAB','BUMP','CP','ASSEMBLY','FT','DPS'], status:'closed', createdAt:'2024-06-15', closedAt:'2025-02-28', note:'양산 완료' },
];
let nextId = 4;

// 생산계획목록에서 FAB Start Qty 합산값 (과제명 기준)
// 동일 과제명의 여러 매출기안 FAB Start Qty를 합산한 결과
// 실제 연동 시 API에서 받아오는 데이터
const PLAN_START_QTY = {
  'UC60Plus C4'  : null,  // FAB 물대항목 MPW(수기입력) — 미지정
  'Albatross_N1B': 6,     // RFQ-260301-001 Pilot Wafer 6PCS
  'Ratel_N1C'    : 20,    // 양산 20PCS (종료 과제)
};

// 모달 컨텍스트
let editCtx  = null;
let closeCtx = null;
let reopenCtx= null;

// ── 필터 ──────────────────────────────────────────────────────────────────
function filtered(){
  const proj  = (document.getElementById('f-proj')?.value||'').toLowerCase();
  const cust  = (document.getElementById('f-cust')?.value||'').toLowerCase();
  const am    = document.getElementById('f-am')?.value||'';
  const pm    = (document.getElementById('f-pm')?.value||'').toLowerCase();
  const status= document.getElementById('f-status')?.value||'';
  return PROJECTS.filter(p=>{
    if(proj   && !p.project.toLowerCase().includes(proj))   return false;
    if(cust   && !p.customer.toLowerCase().includes(cust))  return false;
    if(am     && p.am !== am)                               return false;
    if(pm     && !(p.pm||'').toLowerCase().includes(pm))    return false;
    if(status && p.status !== status)                       return false;
    return true;
  });
}

// ── 메트릭 ────────────────────────────────────────────────────────────────
function renderMetrics(){
  const total  = PROJECTS.length;
  const active = PROJECTS.filter(p=>p.status==='active').length;
  const closed = PROJECTS.filter(p=>p.status==='closed').length;
  // 활성 과제의 FAB Start Qty 합산
  const activeQty = PROJECTS
    .filter(p=>p.status==='active')
    .reduce((s,p)=>s+(PLAN_START_QTY[p.project]||0),0);

  document.getElementById('metrics').innerHTML=`
    <div class="metric">
      <div class="metric-label">전체 과제</div>
      <div class="metric-val">${total}</div>
      <div class="metric-sub">건</div>
    </div>
    <div class="metric">
      <div class="metric-label">활성 과제</div>
      <div class="metric-val" style="color:#27500A">${active}</div>
      <div class="metric-sub">건</div>
    </div>
    <div class="metric">
      <div class="metric-label">종료 과제</div>
      <div class="metric-val" style="color:#5F5E5A">${closed}</div>
      <div class="metric-sub">건</div>
    </div>
    <div class="metric">
      <div class="metric-label">활성 FAB Start Qty 합계</div>
      <div class="metric-val">${activeQty||'—'}</div>
      <div class="metric-sub">PCS</div>
    </div>
  `;
}

// ── 메인 렌더 ─────────────────────────────────────────────────────────────
function render(){
  const list = filtered();
  renderMetrics();

  const statusVal = document.getElementById('f-status')?.value||'';
  const statusText = statusVal==='active'?'활성만':statusVal==='closed'?'종료만':'전체(종료 포함)';
  document.getElementById('filter-summary').textContent=`${statusText} · ${list.length}건 표시`;
  document.getElementById('toolbar-info').textContent=`검색 결과 ${list.length}건`;

  if(!list.length){
    document.getElementById('tbody').innerHTML=`
      <tr><td colspan="10" style="text-align:center;padding:36px;color:var(--color-text-secondary)">
        검색 결과가 없습니다
      </td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML=list.map(p=>{
    const isClosed = p.status==='closed';
    const qty = PLAN_START_QTY[p.project];
    const qtyHtml = qty!=null
      ? `<span style="font-weight:600">${qty.toLocaleString()}</span><span style="font-size:10px;color:var(--color-text-secondary);margin-left:3px">PCS</span>`
      : `<span style="color:var(--color-text-secondary)">—</span>`;
    const pmBadge = p.pm
      ? `<span class="badge b-pm">PM: ${p.pm}</span>`
      : `<span class="badge b-pm-none">미지정</span>`;
    const statusBadge = isClosed
      ? `<span class="badge b-closed">종료</span>`
      : `<span class="badge b-active">활성</span>`;
    const scmHtml = p.scmFlow.map(s=>
      `<span class="badge ${STEP_BADGE[s]||'b-dps'}">${s}</span>`
    ).join('');

    const closedNote = isClosed && p.closedAt
      ? `<div style="font-size:10px;color:var(--color-text-secondary);margin-top:1px">종료: ${p.closedAt}</div>`
      : '';

    const actionHtml = isClosed
      ? `<button class="btn xs primary" onclick="openReopenModal(${p.id})">재개</button>
         <button class="btn xs" onclick="openEditModal(${p.id})" style="margin-left:3px">수정</button>`
      : `<button class="btn xs warn" onclick="openCloseModal(${p.id})">종료처리</button>
         <button class="btn xs" onclick="openEditModal(${p.id})" style="margin-left:3px">수정</button>`;

    return `<tr class="${isClosed?'row-closed':'row-active'}">
      <td>
        <div style="font-weight:500">${p.project}</div>
        ${closedNote}
      </td>
      <td>${p.customer}</td>
      <td class="mono">${p.alCode||'—'}</td>
      <td style="font-weight:500">${p.am}</td>
      <td>${pmBadge}</td>
      <td><div class="scm-flow">${scmHtml}</div></td>
      <td style="text-align:right">${qtyHtml}</td>
      <td style="color:var(--color-text-secondary);font-size:11px">${p.createdAt}</td>
      <td style="text-align:center">${statusBadge}</td>
      <td style="text-align:center">
        <div style="display:flex;gap:4px;justify-content:center;align-items:center">${actionHtml}</div>
      </td>
    </tr>`;
  }).join('');
}

// ── 검색 초기화 ───────────────────────────────────────────────────────────
function resetSearch(){
  ['f-proj','f-cust','f-pm'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('f-am').value='';
  document.getElementById('f-status').value='active';
  render();
}

// ── SCM 체크박스 ──────────────────────────────────────────────────────────
function renderScmChecks(selected=[]){
  document.getElementById('m-scm-checks').innerHTML = SCM_STEPS.map(s=>{
    const on = selected.includes(s);
    return `<label class="step-lbl${on?' on':''}" id="scm-lbl-${s}">
      <input type="checkbox" value="${s}" ${on?'checked':''} onchange="onScmCheck('${s}',this.checked)">
      ${s}
    </label>`;
  }).join('');
}
function onScmCheck(step, checked){
  const lbl = document.getElementById(`scm-lbl-${step}`);
  checked ? lbl.classList.add('on') : lbl.classList.remove('on');
}
function getScmSelected(){
  return SCM_STEPS.filter(s=>{
    const el = document.querySelector(`#m-scm-checks input[value="${s}"]`);
    return el && el.checked;
  });
}

// ── 등록/수정 모달 ────────────────────────────────────────────────────────
function openAddModal(){
  editCtx = null;
  document.getElementById('modal-title').textContent = '과제 등록';
  ['m-proj','m-cust','m-alcode','m-pm','m-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-am').value='';
  renderScmChecks([]);
  clearFormErr();
  document.getElementById('edit-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('m-proj').focus(),60);
}
function openEditModal(id){
  const p = PROJECTS.find(x=>x.id===id); if(!p) return;
  editCtx = id;
  document.getElementById('modal-title').textContent = '과제 수정';
  document.getElementById('m-proj').value   = p.project;
  document.getElementById('m-cust').value   = p.customer;
  document.getElementById('m-alcode').value = p.alCode||'';
  document.getElementById('m-am').value     = p.am;
  document.getElementById('m-pm').value     = p.pm||'';
  document.getElementById('m-note').value   = p.note||'';
  renderScmChecks(p.scmFlow);
  clearFormErr();
  document.getElementById('edit-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('m-proj').focus(),60);
}
function closeEditModal(){
  document.getElementById('edit-backdrop').classList.remove('open');
  editCtx = null;
}
function clearFormErr(){
  ['m-proj','m-cust','m-am'].forEach(id=>document.getElementById(id)?.classList.remove('err'));
  document.getElementById('m-scm-err').style.display='none';
}
function saveProject(){
  const proj    = document.getElementById('m-proj').value.trim();
  const cust    = document.getElementById('m-cust').value.trim();
  const am      = document.getElementById('m-am').value;
  const alCode  = document.getElementById('m-alcode').value.trim();
  const pm      = document.getElementById('m-pm').value.trim();
  const note    = document.getElementById('m-note').value.trim();
  const scmFlow = getScmSelected();

  clearFormErr();
  let ok = true;
  if(!proj){ document.getElementById('m-proj').classList.add('err'); ok=false; }
  if(!cust){ document.getElementById('m-cust').classList.add('err'); ok=false; }
  if(!am)  { document.getElementById('m-am').classList.add('err');   ok=false; }
  if(!scmFlow.length){ document.getElementById('m-scm-err').style.display='block'; ok=false; }
  if(!ok) return;

  const today = new Date().toISOString().slice(0,10);
  if(editCtx === null){
    PROJECTS.push({id:nextId++, project:proj, customer:cust, alCode, pm:pm||null, am, scmFlow,
      status:'active', createdAt:today, closedAt:null, note});
  } else {
    const p = PROJECTS.find(x=>x.id===editCtx);
    if(p) Object.assign(p,{project:proj, customer:cust, alCode, pm:pm||null, am, scmFlow, note});
  }
  closeEditModal();
  render();
}

// ── 종료 처리 모달 ────────────────────────────────────────────────────────
function openCloseModal(id){
  closeCtx = id;
  const p = PROJECTS.find(x=>x.id===id);
  const qty = PLAN_START_QTY[p.project];
  const qtyNote = qty!=null
    ? `<br><br>현재 FAB Start Qty: <strong>${qty.toLocaleString()} PCS</strong>`
    : '';
  document.getElementById('close-desc').innerHTML=`
    <strong>${p.project}</strong> 과제를 종료 처리합니다.${qtyNote}
    <br><br>종료된 과제는 생산계획목록 기본 화면에서 숨겨지며,<br>
    언제든지 이 화면에서 재개할 수 있습니다.`;
  document.getElementById('close-backdrop').classList.add('open');
}
function cancelClose(){
  document.getElementById('close-backdrop').classList.remove('open');
  closeCtx = null;
}
function confirmClose(){
  if(closeCtx===null) return;
  const p = PROJECTS.find(x=>x.id===closeCtx);
  if(p){ p.status='closed'; p.closedAt=new Date().toISOString().slice(0,10); }
  cancelClose();
  render();
}

// ── 재개 모달 ─────────────────────────────────────────────────────────────
function openReopenModal(id){
  reopenCtx = id;
  const p = PROJECTS.find(x=>x.id===id);
  document.getElementById('reopen-desc').innerHTML=`
    <strong>${p.project}</strong> 과제를 활성 상태로 재개합니다.
    <br><br>종료일: <strong>${p.closedAt||'—'}</strong>`;
  document.getElementById('reopen-backdrop').classList.add('open');
}
function cancelReopen(){
  document.getElementById('reopen-backdrop').classList.remove('open');
  reopenCtx = null;
}
function confirmReopen(){
  if(reopenCtx===null) return;
  const p = PROJECTS.find(x=>x.id===reopenCtx);
  if(p){ p.status='active'; p.closedAt=null; }
  cancelReopen();
  render();
}

// 백드롭 클릭 닫기
['edit-backdrop','close-backdrop','reopen-backdrop'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});

render();
</script>
</body>
