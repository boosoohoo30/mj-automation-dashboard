<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>입출하관리 v4 | 생산관리</title>
<style>
:root{
  --bg:#F0F2F5;--surface:#fff;--border:#E0E3E8;
  --text:#1A1D23;--text2:#5A6070;
  --primary:#3B5BDB;--primary-h:#2F4AC4;
  --mpw-bg:#FEF8F0;--mpw:#854F0B;
  --pilot-bg:#F6F5FF;--pilot:#3C3489;
  --prod-bg:#F3F9ED;--prod:#27500A;
  --green:#2F9E44;--red:#C92A2A;--amber:#D97700;
  --in-bg:#F0F7FF;--out-bg:#FFFDF0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}
.nav{background:#1A1D23;color:#fff;display:flex;align-items:center;padding:0 24px;height:48px;gap:4px;flex-shrink:0}
.nav-brand{font-weight:700;font-size:15px;margin-right:20px}
.nav-item{padding:0 14px;height:48px;display:flex;align-items:center;font-size:13px;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent}
.nav-item:hover{color:#fff}
.nav-item.on{color:#fff;border-bottom-color:var(--primary)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sb-hd h2{font-size:14px;font-weight:700;margin-bottom:8px}
.sb-search{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;outline:none}
.sb-search:focus{border-color:var(--primary)}
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{padding:9px 16px;cursor:pointer;border-left:3px solid transparent}
.sb-item:hover{background:#F8F9FA}
.sb-item.active{background:#EEF2FF;border-left-color:var(--primary)}
.sb-name{font-size:13px;font-weight:600;margin-bottom:2px}
.sb-meta{font-size:11px;color:var(--text2)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.no-proj{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px}
.proj-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.proj-name{font-size:17px;font-weight:700;margin-bottom:4px}
.proj-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.proj-meta strong{color:var(--text);font-weight:600}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;flex-shrink:0}
.tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2)}
.tab:hover{color:var(--text)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.panel{flex:1;overflow-y:auto;padding:18px 20px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.sec-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-title{font-size:14px;font-weight:700;flex:1}
.rec-wrap{overflow-x:auto}
.rec{width:100%;border-collapse:collapse;font-size:12px}
.rec th{background:#F3F5F8;padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
.rec td{padding:7px 10px;border-bottom:1px solid #F0F2F5;vertical-align:middle}
.rec tr:last-child td{border-bottom:none}
.in-row td{background:var(--in-bg)}
.in-row.done td{background:#F0FDF4}
.out-row td{background:var(--out-bg)}
.out-row td:first-child{padding-left:22px;position:relative}
.out-row td:first-child::before{content:"└ ";color:#bbb}
.rec tr.in-row:hover td{background:#E8F2FF}
.rec tr.out-row:hover td{background:#FFFAE0}
.type-in{display:inline-block;padding:1px 7px;background:#DBEAFE;color:#1D4ED8;border-radius:4px;font-size:10px;font-weight:700}
.type-out{display:inline-block;padding:1px 7px;background:#FEF3C7;color:#92400E;border-radius:4px;font-size:10px;font-weight:700}
.rec-mono{font-family:monospace}
.empty-row{padding:24px;text-align:center;color:var(--text2)}
.st-pill{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.st-진행중{background:#EEF2FF;color:#3B5BDB}
.st-완료{background:#EBFBEE;color:#2F9E44}
.st-scrap{background:#FFE3E3;color:#C92A2A}
.dir-pill{padding:1px 7px;border-radius:10px;font-size:11px;background:#F3F5F8;color:#333;white-space:nowrap}
.dir-고객출하{background:#E6FCF5;color:#0CA678}
.dir-보관{background:#FFF4E6;color:#D9480F}
.dir-scrap{background:#FFE3E3;color:#C92A2A}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-mpw{background:var(--mpw-bg);color:var(--mpw)}
.b-pilot{background:var(--pilot-bg);color:var(--pilot)}
.b-prod{background:var(--prod-bg);color:var(--prod)}
.bdg-rem{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.bdg-done{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#D1FAE5;color:#065F46}
.bdg-inprog{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#DBEAFE;color:#1D4ED8}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 7px;font-size:11px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:#f0f0f0}
.btn-danger{background:#fff;border:1px solid #fcc;color:var(--red)}
.btn-danger:hover{background:#FFF5F5}
.btn-out{background:#fff;border:1px solid #FDE68A;color:#92400E}
.btn-out:hover{background:#FFFBEB}
.btn-edit{background:#fff;border:1px solid #C7D2FE;color:#3730A3}
.btn-edit:hover{background:#EEF2FF}
.actions{display:flex;gap:4px;flex-wrap:nowrap}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:40px;overflow-y:auto}
.overlay.open{display:flex}
.mbox{background:#fff;border-radius:10px;width:640px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);margin-bottom:20px}
.mbox.wide{width:820px}
.mhd{padding:15px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhd h3{font-size:15px;font-weight:700}
.mclose{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.mbody{padding:18px 20px;overflow-y:auto;flex:1}
.mft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);outline:none;background:#fff;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
.fld-note{font-size:10px;color:var(--text2);margin-top:2px}
.fld-pre{background:#F8F9FA!important;color:var(--text2)!important}
.msec{font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}

/* ── WAFER POOL & DISTRIBUTIONS ── */
.wafer-pool{padding:10px 12px;background:#F8F9FA;border:1px solid var(--border);border-radius:6px;margin-bottom:12px}
.wafer-pool-hd{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.wafer-pool-chips{display:flex;flex-wrap:wrap;gap:3px}
.wchip{display:inline-block;padding:3px 8px;border-radius:4px;font-family:monospace;font-size:11px;background:#fff;border:1px solid var(--border);min-width:38px;text-align:center}
.wchip.used{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5;text-decoration:line-through;opacity:.6}
.wchip.dist0{background:#DBEAFE;color:#1D4ED8;border-color:#93C5FD}
.wchip.dist1{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
.wchip.dist2{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
.wchip.dist3{background:#FCE7F3;color:#9D174D;border-color:#F9A8D4}
.wchip.dist4{background:#E0E7FF;color:#3730A3;border-color:#A5B4FC}
.dist-block{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;background:#FFFFFF;position:relative}
.dist-block.has-color{border-left-width:4px}
.dist-block.c0{border-left-color:#1D4ED8}
.dist-block.c1{border-left-color:#065F46}
.dist-block.c2{border-left-color:#92400E}
.dist-block.c3{border-left-color:#9D174D}
.dist-block.c4{border-left-color:#3730A3}
.dist-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dist-hd-title{font-size:13px;font-weight:700}
.dist-row{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;margin-bottom:8px}
.wf-input{font-family:monospace}

/* ── PARSE & UPLOAD ── */
.parse-area{width:100%;height:110px;resize:vertical;font-family:monospace;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:8px;outline:none}
.parse-area:focus{border-color:var(--primary)}
.parse-ok{color:var(--green);font-size:13px;font-weight:600;margin-bottom:8px}
.parse-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px}
.parse-table th{background:#F3F5F8;padding:6px 10px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.parse-table td{padding:6px 10px;border-bottom:1px solid #F0F2F5}
.parse-table tr:last-child td{border-bottom:none;font-weight:600;background:#F8F9FA}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:.15s}
.upload-area:hover{border-color:var(--primary);background:#F8F9FF}
.upload-title{font-size:14px;font-weight:500;margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--text2)}
.upload-sub a{color:var(--primary);cursor:pointer;text-decoration:underline}

/* ── TEMPLATE GUIDE ── */
.tpl-box{background:#F8F9FA;border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px}
.tpl-box-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tpl-box-hd span{font-weight:600;color:var(--text)}
.tpl-table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border-radius:4px;overflow:hidden}
.tpl-table th{background:#EEF2FF;padding:5px 8px;color:#3B5BDB;font-weight:600;border-bottom:1px solid #C7D2FE;white-space:nowrap;text-align:left}
.tpl-table td{padding:4px 8px;color:var(--text2);border-bottom:1px solid #F0F2F5}
.tpl-table tr:last-child td{border-bottom:none}
.tpl-note{font-size:11px;color:var(--text2);margin-top:6px}
</style>

<script>
/* ═══════════════ DATA ═══════════════ */
const PROJECTS=[
  {id:0,customer:'Samsung',name:'SI0136A',alCode:'BX4K72A',cls:'MPW',qty:40,unit:'EA',tmCode:'TMWC09_C16',netDie:'',scmFlow:['FAB']},
  {id:1,customer:'SK Hynix',name:'ANA38413_N1C',alCode:'TR9M21A',cls:'Pilot Wafer',qty:5,unit:'PCS',tmCode:'TMVZ07',netDie:'850',scmFlow:['FAB','CP']},
  {id:2,customer:'LG Electronics',name:'Ratel_N1C',alCode:'PJ2H67A',cls:'Production Wafer',qty:6,unit:'PCS',tmCode:'TMMQ65',netDie:'1200',scmFlow:['FAB','ASSEMBLY','FT']},
  {id:3,customer:'Samsung',name:'FALCON_N1B',alCode:'QN8L44A',cls:'Production Wafer',qty:50,unit:'PCS',tmCode:'TMSV86',netDie:'',scmFlow:['FAB']},
  {id:4,customer:'LG Electronics',name:'Tachy-BS4_N1A',alCode:'HL6T38A',cls:'Production Wafer',qty:20,unit:'PCS',tmCode:'TMUE69',netDie:'620',scmFlow:['FAB','FT']},
];

let nextId=100;
const RECORDS=[
  /* MPW: IN=OUT, 잔여 없음 */
  {id:1,pid:0,step:'FAB',dir:'IN',ver:'A',date:'2026-01-25',startQty:40,remark:'초도 투입'},
  {id:2,pid:0,step:'FAB',dir:'OUT',parentId:1,ver:'A',date:'2026-05-06',
   invoiceNo:'0K64260506VY',
   items:[{itemNo:1,productName:'SI0136A',chipId:'G6X997.1#1',qty:20,unit:'EA'},
          {itemNo:2,productName:'SI0136A',chipId:'G6X997.1#2',qty:20,unit:'EA'}],
   totalQty:40,unit:'EA',status:'완료',direction:'고객출하',remark:''},

  /* Pilot ANA38413: 5장 IN, 5장 OUT (전량 다음step) */
  {id:3,pid:1,step:'FAB',dir:'IN',ver:'A',date:'2026-02-20',lotId:'LOT-2602-001',qty:5,waferNos:[1,2,3,4,5],remark:''},
  {id:4,pid:1,step:'FAB',dir:'OUT',parentId:3,ver:'A',date:'2026-03-28',lotId:'LOT-2602-001',
   waferNos:[1,2,3,4,5],qty:5,status:'완료',direction:'다음step',reject:0,yld:'99.50',remark:''},
  {id:5,pid:1,step:'CP',dir:'LOT',lotId:'LOT-2602-001',qty:5,waferNos:[1,2,3,4,5],
   receiveDate:'2026-04-01',startDate:'2026-04-03',endDate:'2026-04-20',
   inQtyPcs:5,inQtyEa:74500,outQtyPcs:5,outQtyEa:73850,reject:650,yld:'99.13',status:'완료',direction:'고객출하',remark:''},

  /* FALCON_N1B (Production): 잔여 케이스 예시 — 25장 IN, 3장 고객출하 + 3장 보관 = 잔여 19장 */
  {id:6,pid:3,step:'FAB',dir:'IN',ver:'A',date:'2026-04-10',lotId:'LOT-2604-001',qty:25,waferNos:Array.from({length:25},(_,i)=>i+1),remark:'초도 25장'},
  {id:7,pid:3,step:'FAB',dir:'OUT',parentId:6,ver:'A',date:'2026-05-20',lotId:'LOT-2604-001',
   waferNos:[1,2,3],qty:3,status:'완료',direction:'고객출하',reject:0,yld:'99.20',remark:'우선 출하분'},
  {id:8,pid:3,step:'FAB',dir:'OUT',parentId:6,ver:'A',date:'2026-05-20',lotId:'LOT-2604-001',
   waferNos:[4,5,6],qty:3,status:'진행중',direction:'보관',reject:0,yld:'',remark:'Cont Hold'},
];

/* ═══════════════ STATE ═══════════════ */
let selPid=-1,selStep='',sbQuery='';
let mCtx={};
let parsedItems=[],excelRows=[];
let editLotId=null,editFabInId=null,editFabOutId=null;
let distributions=[];  /* FAB OUT 분배 임시 상태 */

/* ═══════════════ WAFER HELPERS ═══════════════ */
function wafersToStr(arr){
  if(!arr||!arr.length) return '';
  const s=[...arr].sort((a,b)=>a-b);
  const ranges=[];
  let st=s[0],pr=s[0];
  for(let i=1;i<=s.length;i++){
    if(i<s.length&&s[i]===pr+1){pr=s[i];}
    else{ranges.push(st===pr?`#${st}`:`#${st}-${pr}`);if(i<s.length){st=s[i];pr=s[i];}}
  }
  return ranges.join(', ');
}

/* "1-3, 5, 7-9" → [1,2,3,5,7,8,9] */
function parseWaferStr(str){
  const out=[];
  if(!str) return out;
  str.split(/[,;]+/).forEach(part=>{
    part=part.replace(/#/g,'').trim();
    if(!part) return;
    if(part.includes('-')){
      const [a,b]=part.split('-').map(s=>parseInt(s.trim()));
      if(!isNaN(a)&&!isNaN(b))for(let i=Math.min(a,b);i<=Math.max(a,b);i++)out.push(i);
    } else {
      const n=parseInt(part);
      if(!isNaN(n)) out.push(n);
    }
  });
  return [...new Set(out)].sort((a,b)=>a-b);
}

/* ═══════════════ RESIDUAL TRACKING ═══════════════ */
function getOutWafers(parentInId){
  return RECORDS.filter(r=>r.parentId===parentInId&&r.dir==='OUT')
    .flatMap(r=>r.waferNos||[]);
}
function getRemainingWafers(parentInId){
  const inRec=RECORDS.find(r=>r.id===parentInId);
  if(!inRec||!inRec.waferNos) return [];
  const out=getOutWafers(parentInId);
  return inRec.waferNos.filter(n=>!out.includes(n));
}
function isFullyShipped(inRec){
  if(inRec.startQty!==undefined) return true;  /* MPW: 항상 전량 */
  return getRemainingWafers(inRec.id).length===0
    && RECORDS.some(r=>r.parentId===inRec.id&&r.dir==='OUT');
}

/* ═══════════════ TSMC PARSER ═══════════════ */
function parseTSMCInvoice(text){
  const lines=text.split('\n'),items=[];
  let invoiceNo='';
  const invM=text.match(/INVOICE NO\.\:\s*(\S+)/); if(invM) invoiceNo=invM[1];
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const itemM=line.match(/^\s{2,5}(\d+)\s{2,4}(AL-\S+)\s/);
    if(!itemM) continue;
    const itemNo=parseInt(itemM[1]);
    let productName='',tmCode='',qty=0,unit='EA',chipId='';
    for(let j=i+1;j<Math.min(i+10,lines.length);j++){
      const raw=lines[j],l=raw.trim();
      if(!l) continue;
      if(/^\s{2,5}\d+\s{2,4}AL-/.test(raw)&&j>i) break;
      if(l.startsWith('---')||l.startsWith('GRAND')||l.startsWith('TOTAL')) break;
      if(!productName){
        const pm=raw.match(/^\s{5,}(\w+)\s{4,}(\w+)\s*$/);
        if(pm){productName=pm[1];tmCode=pm[2];continue;}
      }
      const qm=l.match(/^(\d+)\s+(EA|PCS)$/); if(qm){qty=parseInt(qm[1]);unit=qm[2];continue;}
      const cm=l.match(/^(\S+#\d+)$/); if(cm&&!chipId){chipId=cm[1];}
    }
    if(qty>0) items.push({itemNo,productName,tmCode,qty,unit,chipId});
  }
  return {invoiceNo,items};
}

function updateWaferPreview(val){

  el.textContent=`→ Wafer #1-${n} 까지 자동 할당 (총 ${n}장)`;el.style.color='var(--primary)';
}

function saveFabIn(){
  const rec={pid:mCtx.pid,step:'FAB',dir:'IN'};
  rec.ver=v('fi-ver')||'A'; rec.date=v('fi-date'); rec.remark=v('fi-remark');
  if(!rec.date){alert('날짜를 입력해주세요.');return;}
  if(mCtx.mpw){
    rec.startQty=Number(v('fi-startqty'))||0;
    if(!rec.startQty){alert('Start Qty를 입력해주세요.');return;}
  } else {
    const qty=parseInt(v('fi-qty'))||0;
    if(qty<1){alert('수량을 입력해주세요.');return;}
    if(qty>25){alert('Lot당 최대 25장까지만 가능합니다.');return;}
    rec.lotId=v('fi-lotid');
    if(!rec.lotId){alert('Lot ID를 입력해주세요.');return;}
    rec.qty=qty;
    rec.waferNos=Array.from({length:qty},(_,i)=>i+1);
  }
  if(editFabInId){
    const orig=RECORDS.find(x=>x.id===editFabInId);
    /* 편집 시: 기존 OUT 레코드에서 사용 중인 wafer 보호 */
    if(!mCtx.mpw){
      const usedOut=getOutWafers(editFabInId);
      const removed=usedOut.filter(n=>!rec.waferNos.includes(n));
      if(removed.length){alert(`OUT 등록된 Wafer #${removed.join(',')}는 제거할 수 없습니다.`);return;}
    }
    Object.assign(orig,rec);
  } else {
    rec.id=nextId++; RECORDS.push(rec);
  }
  closeM('ov-fi');rerenderPanel();
}
function editFabIn(id){const r=RECORDS.find(x=>x.id===id);openFabIn(r.pid,id);}

function renderDistributions(parentIn){
  const inWafers=parentIn.waferNos||[];
  const outedOthers=editFabOutId
    ?RECORDS.filter(r=>r.parentId===parentIn.id&&r.dir==='OUT'&&r.id!==editFabOutId).flatMap(r=>r.waferNos||[])
    :getOutWafers(parentIn.id);
  document.getElementById('fo-dist-list').innerHTML=distributions.map((d,idx)=>{
    const DIRS=['다음step','고객출하','보관','scrap','기타'],STS=['진행중','완료','scrap'];
    return `<div class="dist-block has-color c${idx%5}">
      <div class="dist-hd">
        <span class="dist-hd-title" style="color:var(--text)">분배 ${idx+1}</span>
        ${distributions.length>1?`<button class="btn btn-xs btn-danger" onclick="removeDistribution(${idx})">✕ 분배 삭제</button>`:''}
      </div>
      <div class="fg c3" style="margin-bottom:8px">
        <div class="field" style="grid-column:span 3">
          <label>Wafer 선택 <span class="fld-note">예: 1-3,5 또는 1-25</span></label>
          <input class="wf-input" id="d-wafer-${idx}" value="${d.waferStr||''}" placeholder="1-3, 5" oninput="onDistWaferChange()">
          <span class="fld-note" id="d-wafer-info-${idx}"></span>
        </div>
      </div>
      <div class="fg c3">
        <div class="field"><label>처리방향</label>
          <select id="d-dir-${idx}" onchange="distributions[${idx}].direction=this.value">${DIRS.map(o=>`<option ${d.direction===o?'selected':''}>${o}</option>`).join('')}</select></div>
        <div class="field"><label>상태</label>
          <select id="d-st-${idx}" onchange="distributions[${idx}].status=this.value">${STS.map(o=>`<option ${d.status===o?'selected':''}>${o}</option>`).join('')}</select></div>
        <div class="field"><label>Reject</label><input id="d-rej-${idx}" type="number" min="0" value="${d.reject??''}" onchange="distributions[${idx}].reject=this.value"></div>
      </div>
      <div class="fg">
        <div class="field"><label>YLD%</label><input id="d-yld-${idx}" placeholder="99.5" value="${d.yld||''}" onchange="distributions[${idx}].yld=this.value"></div>
        <div class="field"><label>Remark</label><input id="d-rmk-${idx}" value="${d.remark||''}" onchange="distributions[${idx}].remark=this.value"></div>
      </div>
    </div>`;
  }).join('');
  /* sync state from inputs */
  distributions.forEach((d,idx)=>{
    const inp=document.getElementById(`d-wafer-${idx}`);
    if(inp&&!inp._bound){inp._bound=true;}
  });
  renderWaferPool(parentIn,outedOthers);
  updateDistInfo(parentIn,outedOthers);
}

function renderWaferPool(parentIn,outedOthers){
  const inWafers=parentIn.waferNos||[];
  /* compute assignment per distribution */
  const assigned={}; /* waferNo → distIdx */
  distributions.forEach((d,idx)=>{
    parseWaferStr(d.waferStr).forEach(n=>{if(assigned[n]===undefined)assigned[n]=idx;});
  });
  document.getElementById('fo-pool').innerHTML=inWafers.map(n=>{
    if(outedOthers.includes(n)) return `<span class="wchip used" title="다른 OUT에서 처리됨">#${String(n).padStart(2,'0')}</span>`;
    if(assigned[n]!==undefined) return `<span class="wchip dist${assigned[n]%5}">#${String(n).padStart(2,'0')}</span>`;
    return `<span class="wchip">#${String(n).padStart(2,'0')}</span>`;
  }).join('');
  const remCnt=inWafers.length-outedOthers.length-Object.keys(assigned).length;
  document.getElementById('fo-pool-status').innerHTML=
    `<span style="color:var(--text2)">전체 ${inWafers.length}장 · 다른 OUT ${outedOthers.length}장 · 본 분배 ${Object.keys(assigned).length}장 · 미할당 <strong>${remCnt}</strong>장</span>`;
}

function updateDistInfo(parentIn,outedOthers){
  distributions.forEach((d,idx)=>{
    const nums=parseWaferStr(d.waferStr);
    const info=document.getElementById(`d-wafer-info-${idx}`);
    if(!info) return;
    const invalid=nums.filter(n=>!parentIn.waferNos.includes(n)||outedOthers.includes(n));
    if(invalid.length){
      info.innerHTML=`<span style="color:var(--red)">⚠ Wafer #${invalid.join(',')}는 잔여 풀에 없음</span>`;
    } else if(!nums.length){
      info.textContent='Wafer를 입력해주세요';
    } else {
      info.innerHTML=`<span style="color:var(--green)">✓ ${nums.length}장 선택 (${wafersToStr(nums)})</span>`;
    }
  });
}

function onDistWaferChange(){
  distributions.forEach((d,idx)=>{
    const inp=document.getElementById(`d-wafer-${idx}`);
    if(inp) d.waferStr=inp.value;
  });
  const parentIn=RECORDS.find(r=>r.id===mCtx.parentInId);
  const outedOthers=editFabOutId
    ?RECORDS.filter(r=>r.parentId===parentIn.id&&r.dir==='OUT'&&r.id!==editFabOutId).flatMap(r=>r.waferNos||[])
    :getOutWafers(parentIn.id);
  renderWaferPool(parentIn,outedOthers);
  updateDistInfo(parentIn,outedOthers);
}

function addDistribution(){
  /* commit current input values first */
  distributions.forEach((d,idx)=>{const inp=document.getElementById(`d-wafer-${idx}`);if(inp)d.waferStr=inp.value;});
  distributions.push({waferStr:'',status:'완료',direction:'다음step',reject:'',yld:'',remark:''});
  const parentIn=RECORDS.find(r=>r.id===mCtx.parentInId);
  renderDistributions(parentIn);
}
function removeDistribution(idx){
  distributions.forEach((d,i)=>{const inp=document.getElementById(`d-wafer-${i}`);if(inp)d.waferStr=inp.value;});
  distributions.splice(idx,1);
  const parentIn=RECORDS.find(r=>r.id===mCtx.parentInId);
  renderDistributions(parentIn);
}

function saveFabOut(){
  const date=v('fo-date');
  if(!date){alert('날짜를 입력해주세요.');return;}
  if(mCtx.mpw){
    /* MPW: 단일 OUT */
    if(!parsedItems.length&&!confirm('파싱 결과가 없습니다. 그래도 저장할까요?')) return;
    const rec={pid:mCtx.pid,step:'FAB',dir:'OUT',parentId:mCtx.parentInId,
      ver:v('fo-ver')||'A',date,
      invoiceNo:(document.getElementById('fo-text')?.value.match(/INVOICE NO\.\:\s*(\S+)/)||[])[1]||'',
      items:[...parsedItems],totalQty:parsedItems.reduce((a,i)=>a+i.qty,0),
      unit:parsedItems[0]?.unit||'EA',status:v('fo-status'),direction:v('fo-direction'),remark:v('fo-remark')};
    if(editFabOutId){Object.assign(RECORDS.find(x=>x.id===editFabOutId),rec);}
    else{rec.id=nextId++;RECORDS.push(rec);}
    closeM('ov-fo');rerenderPanel();
    return;
  }

  /* Wafer: 다중 분배 → 여러 OUT 레코드 */
  /* commit inputs */
  distributions.forEach((d,idx)=>{
    const inp=document.getElementById(`d-wafer-${idx}`);if(inp)d.waferStr=inp.value;
    d.reject=document.getElementById(`d-rej-${idx}`)?.value??d.reject;
    d.yld=document.getElementById(`d-yld-${idx}`)?.value??d.yld;
    d.remark=document.getElementById(`d-rmk-${idx}`)?.value??d.remark;
  });
  const parentIn=RECORDS.find(r=>r.id===mCtx.parentInId);
  const outedOthers=editFabOutId
    ?RECORDS.filter(r=>r.parentId===parentIn.id&&r.dir==='OUT'&&r.id!==editFabOutId).flatMap(r=>r.waferNos||[])
    :getOutWafers(parentIn.id);
  /* validate */
  const seen=new Set();
  for(let i=0;i<distributions.length;i++){
    const d=distributions[i];
    const nums=parseWaferStr(d.waferStr);
    if(!nums.length){alert(`분배 ${i+1}: Wafer를 입력해주세요.`);return;}
    for(const n of nums){
      if(!parentIn.waferNos.includes(n)){alert(`분배 ${i+1}: Wafer #${n}는 IN에 없습니다.`);return;}
      if(outedOthers.includes(n)){alert(`분배 ${i+1}: Wafer #${n}는 다른 OUT에서 이미 처리됨.`);return;}
      if(seen.has(n)){alert(`Wafer #${n}가 여러 분배에 중복됨.`);return;}
      seen.add(n);
    }
    d._wafers=nums;
  }
  /* save */
  if(editFabOutId){
    /* 편집: 1개 분배만 허용 */
    if(distributions.length>1){alert('편집 모드에서는 분배 1개만 저장 가능합니다. 추가 분배는 모달 닫고 신규 등록하세요.');return;}
    const d=distributions[0];
    Object.assign(RECORDS.find(x=>x.id===editFabOutId),{
      ver:v('fo-ver')||'A',date,lotId:v('fo-lotid'),
      qty:d._wafers.length,waferNos:d._wafers,
      status:d.status,direction:d.direction,
      reject:d.reject===''?null:Number(d.reject),yld:d.yld,remark:d.remark
    });
  } else {
    distributions.forEach(d=>{
      RECORDS.push({id:nextId++,pid:mCtx.pid,step:'FAB',dir:'OUT',parentId:mCtx.parentInId,
        ver:v('fo-ver')||'A',date,lotId:v('fo-lotid'),
        qty:d._wafers.length,waferNos:d._wafers,
        status:d.status,direction:d.direction,
        reject:d.reject===''?null:Number(d.reject),yld:d.yld,remark:d.remark});
    });
  }
  closeM('ov-fo');rerenderPanel();
}
function editFabOut(id){const r=RECORDS.find(x=>x.id===id);openFabOut(r.parentId,id);}

        <button class="btn btn-ghost" id="xl-mode-out" onclick="setXlMode('OUT')">FAB OUT (Wafer · 다중분배)</button>
      </div>
      <div id="xl-tpl-area"></div>`
    :renderTplBox('LOT')}
    <div class="msec"><span>파일 업로드</span></div>
    <div class="upload-area" onclick="document.getElementById('xl-file').click()">
      <input type="file" id="xl-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcel(this)">
      <div class="upload-title">📂 파일 선택 또는 드래그</div>
      <div class="upload-sub">.xlsx / .xls / .csv &nbsp;|&nbsp; <a onclick="event.stopPropagation();demoExcel('${isFab?'':'LOT'}')">데모 데이터 로드</a></div>
    </div>
    <div id="xl-preview"></div>`;
  document.getElementById('ov-xl').classList.add('open');
  if(isFab) setXlMode('IN');
}

function setXlMode(mode){
  mCtx.xlMode=mode;
  document.getElementById('xl-mode-in').classList.toggle('btn-primary',mode==='IN');
  document.getElementById('xl-mode-out').classList.toggle('btn-primary',mode==='OUT');
  document.getElementById('xl-tpl-area').innerHTML=renderTplBox(mode==='IN'?'FAB_IN':'FAB_OUT');
}

function renderTplBox(tplKey){
  const t=TEMPLATES[tplKey];
  return `<div class="tpl-box">
    <div class="tpl-box-hd">
      <span>📋 ${t.title}</span>
      <button class="btn btn-ghost btn-xs" onclick="copyTpl('${tplKey}')">헤더 복사</button>
    </div>
    <div style="overflow-x:auto">
      <table class="tpl-table">
        <thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${t.sample.map(row=>`<tr>${row.map(c=>`<td>${c||'—'}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="tpl-note">${t.note}</div>
  </div>`;
}

function copyTpl(tplKey){
  const t=TEMPLATES[tplKey];
  navigator.clipboard.writeText(t.cols.join('\t')).then(()=>alert('헤더가 클립보드에 복사되었습니다.'));
}

function handleExcel(i){if(i.files[0])demoExcel(mCtx.step==='FAB'?'':'LOT');}

function demoExcel(forceTpl){
  const isFab=mCtx.step==='FAB';
  let mode;
  if(isFab) mode=mCtx.xlMode==='OUT'?'FAB_OUT':'FAB_IN';
  else mode='LOT';
  const t=TEMPLATES[mode];
  excelRows=t.sample.map(row=>{
    const obj={};
    t.cols.forEach((c,i)=>obj[c]=row[i]);
    return obj;
  });
  const tbl=`<table class="parse-table">
    <thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${excelRows.map(r=>`<tr>${t.cols.map(c=>`<td>${r[c]||'—'}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('xl-preview').innerHTML=`<div class="parse-ok" style="margin:10px 0 6px">✅ ${excelRows.length}건 로드됨</div>${tbl}`;
  mCtx._tplMode=mode;
  document.getElementById('xl-save-btn').style.display='inline-block';
}

function saveExcel(){
  const mode=mCtx._tplMode;
  if(mode==='FAB_IN'){
    excelRows.forEach(r=>{
      const qty=parseInt(r['Wafer Qty (1-25)'])||0;
      if(qty<1||qty>25) return;
      RECORDS.push({id:nextId++,pid:mCtx.pid,step:'FAB',dir:'IN',
        ver:r['Ver']||'A',date:r['날짜'],lotId:r['Lot ID'],
        qty,waferNos:Array.from({length:qty},(_,i)=>i+1),remark:r['Remark']||''});
    });
  } else if(mode==='FAB_OUT'){
    /* OUT: Lot ID로 parentIn 매칭 */
    excelRows.forEach(r=>{
      const lotId=r['Lot ID'];
      const parentIn=RECORDS.find(x=>x.pid===mCtx.pid&&x.step==='FAB'&&x.dir==='IN'&&x.lotId===lotId);
      if(!parentIn){console.warn('매칭 IN 없음:',lotId);return;}
      const nums=parseWaferStr(r['Wafer Nos']||'');
      if(!nums.length) return;
      RECORDS.push({id:nextId++,pid:mCtx.pid,step:'FAB',dir:'OUT',parentId:parentIn.id,
        ver:r['Ver']||'A',date:r['날짜'],lotId,qty:nums.length,waferNos:nums,
        direction:r['처리방향']||'다음step',status:r['상태']||'완료',
        reject:r['Reject']?Number(r['Reject']):null,yld:r['YLD%']||'',remark:r['Remark']||''});
    });
  } else {
    /* LOT */
    excelRows.forEach(r=>{
      const qty=parseInt(r['Wafer Qty'])||0;
      RECORDS.push({id:nextId++,pid:mCtx.pid,step:mCtx.step,dir:'LOT',
        lotId:r['Lot ID'],qty,waferNos:qty?Array.from({length:qty},(_,i)=>i+1):[],
        receiveDate:r['입고일'],startDate:r['시작일'],endDate:r['종료일'],
        inQtyPcs:r['In(PCS)']?Number(r['In(PCS)']):null,inQtyEa:r['In(EA)']?Number(r['In(EA)']):null,
        outQtyPcs:r['Out(PCS)']?Number(r['Out(PCS)']):null,outQtyEa:r['Out(EA)']?Number(r['Out(EA)']):null,
        reject:r['Reject']?Number(r['Reject']):null,yld:r['YLD%']||'',
        status:r['상태']||'진행중',direction:r['처리방향']||'다음step',remark:r['Remark']||''});
    });
  }
  closeM('ov-xl');rerenderPanel();
}

renderSidebar();
</script>
</body>
</html>
